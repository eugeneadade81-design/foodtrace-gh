server:
  port: ${PORT:3000}

spring:
  application:
    name: foodtrace-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/foodtrace?stringtype=unspecified}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

foodtrace:
  jwt-secret: ${JWT_SECRET:dev-foodtrace-secret-change-me}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mobile-origins: ${MOBILE_ORIGINS:}
  uploads-dir: ${UPLOADS_DIR:uploads}
  expose-otp: ${EXPOSE_OTP:false}
  public-api-url: ${PUBLIC_API_URL:http://localhost:3000}
  # Africa's Talking SMS/USSD — leave blank to disable; no error is thrown when absent
  africas-talking-api-key: ${AFRICASTALKING_API_KEY:}
  africas-talking-username: ${AFRICASTALKING_USERNAME:sandbox}
  africas-talking-shortcode: ${AFRICASTALKING_SHORTCODE:}
  # Google Cloud TTS — the SDK reads GOOGLE_APPLICATION_CREDENTIALS automatically;
  # only google-cloud-project is wired here for explicit reference in code
  google-cloud-project: ${GOOGLE_CLOUD_PROJECT:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
