name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-apk.yml"

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile
        run: npm run typecheck --workspace mobile

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: foodtrace-gh-release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
