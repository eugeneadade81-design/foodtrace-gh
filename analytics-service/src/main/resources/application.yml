server:
  port: 8081

spring:
  application:
    name: analytics-service

  # Local dev defaults to an in-memory H2 database so the service runs without
  # a Postgres install. On AWS (Day 11) these are overridden by env vars to
  # point at the shared RDS PostgreSQL instance.
  datasource:
    url: ${DB_URL:jdbc:h2:mem:foodtrace;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    gh.foodtrace.analytics: INFO
