server:
  port: 8081

spring:
  application:
    name: analytics-service

  # Local/dev default: in-memory cache (no Redis server needed). Set
  # CACHE_TYPE=redis on AWS/prod to activate RedisConfig and the shared cache.
  cache:
    type: ${CACHE_TYPE:simple}

  # Local dev defaults to an in-memory H2 database so the service runs without
  # a Postgres install. On AWS (Day 11) these are overridden by env vars to
  # point at the shared RDS PostgreSQL instance.
  datasource:
    url: ${DB_URL:jdbc:h2:mem:foodtrace;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      # Local/dev/test default "always" runs schema.sql + data.sql on the H2
      # database. On AWS set SQL_INIT_MODE=never — Role 1 owns the RDS tables
      # and seeding them on every EB restart would violate unique constraints.
      mode: ${SQL_INIT_MODE:always}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Redis is used only as a cache (see RedisConfig), not as a Spring Data
      # store, so disable repository scanning to avoid false-positive warnings.
      repositories:
        enabled: false

# Evidence storage. Disabled by default so local/dev/test use the local stub
# (no AWS needed). On AWS (Day 11) set S3_ENABLED=true + bucket/region.
storage:
  s3:
    enabled: ${S3_ENABLED:false}
    bucket: ${S3_BUCKET:foodtrace-evidence}
    region: ${AWS_REGION:eu-west-1}

# SMS alerts via Africa's Talking. Disabled by default so dev/test use the local
# recording stub (no credentials/network). On AWS (Day 11) set
# SMS_ENABLED=true + AT_USERNAME/AT_API_KEY (sandbox values work for the demo).
sms:
  africastalking:
    enabled: ${SMS_ENABLED:false}
    base-url: ${AT_SMS_URL:https://api.sandbox.africastalking.com/version1/messaging}
    username: ${AT_USERNAME:sandbox}
    api-key: ${AT_API_KEY:}
    sender-id: ${AT_SENDER_ID:}

logging:
  level:
    gh.foodtrace.analytics: INFO
